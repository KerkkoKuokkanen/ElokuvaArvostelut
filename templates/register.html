<h1>elokuva arvostelut</h1>
<h2>Register a New Account</h2>
<p><a href="/">Back to Homepage</a> | <a href="/login">Already have an account? Login</a></p>

<hr>

{% if error %}
    <p style="color: red; font-weight: bold;">{{ error }}</p>
{% endif %}

<form action="/register" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="username">Username:</label><br>
    <input type="text" name="username" id="username" required><br><br>
    
    <label for="password">Password (Minimum 8 characters):</label><br>
    <input type="password" name="password" id="password" minlength="8" required><br><br>
    
    <button type="submit">Register</button>
</form>
